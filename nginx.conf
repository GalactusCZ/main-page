# nginx.conf
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(woff|woff2|ttf|eot|otf|jpg|jpeg|png|gif|webp|avif|ico|svg|mp4|pdf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(css|js)$ {
        expires 14d;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(txt|xml|json)$ {
        expires 1d;
        access_log off;
        add_header Cache-Control "public, must-revalidate";
    }
}